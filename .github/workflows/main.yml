name: IPTV Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Commit IPTV update
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add iptv.m3u
        git commit -m "auto update IPTV playlist" || exit 0
        git push
